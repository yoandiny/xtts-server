services:
  tts-api:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    container_name: tts-api
    environment:
      - PORT=${PORT:-8000}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./speakers:/app/speakers
    restart: unless-stopped

  tts-api-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tts-api-gpu
    environment:
      - PORT=${PORT:-8000}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./speakers:/app/speakers
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    profiles:
      - gpu
    restart: unless-stopped
